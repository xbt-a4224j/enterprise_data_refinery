name: extract
task_type: extract
cadence: daily
schema_ref: PermitRecord
instructions: >
  Extract building-permit fields from the document. Return permit_id, address,
  jurisdiction, permit_type, status, issued_date (YYYY-MM-DD), valuation_usd (number),
  applicant, and description. Use null for anything not present.
sources:
  - name: permits-demo
    kind: file
    location: "fixtures/*.txt"
  - name: permits-messy
    kind: file
    location: "fixtures/messy/*.txt"
  - name: permits-sf
    kind: socrata
    location: "https://data.sfgov.org/resource/i98e-djp9.json"
    options: { limit: 20 }
  - name: permits-nyc
    kind: socrata
    location: "https://data.cityofnewyork.us/resource/ipu4-2q9a.json"
    options: { limit: 20 }
checks:
  null_rate:
    max: { permit_id: 0.0, valuation_usd: 0.5 }
  row_count_delta:
    max_growth: 0.5
